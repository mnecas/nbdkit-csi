apiVersion: v1
kind: PersistentVolume
metadata:
  name: delayed-disk
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nbdkit.csi.k8s.io
    volumeHandle: delayed-disk-1
    volumeAttributes:
      # References the PV name of the source volume that must be staged on the same node
      nbdkit.csi.k8s.io/source-pv: "vmware-disk-1"
      nbdkit.csi.k8s.io/filters: "delay,cow"
      nbdkit.csi.k8s.io/filter-param-delay-read: "100ms"
      nbdkit.csi.k8s.io/filter-param-delay-write: "200ms"
      nbdkit.csi.k8s.io/filter-param-delay-zero: "50ms"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delayed-disk
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  storageClassName: ""
  resources:
    requests:
      storage: 100Gi
  volumeName: delayed-disk
