apiVersion: v1
kind: PersistentVolume
metadata:
  name: vmware-disk-1
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nbdkit.csi.k8s.io
    volumeHandle: vmware-disk-1
    volumeAttributes:
      nbdkit.csi.k8s.io/plugin: "vddk"
      nbdkit.csi.k8s.io/param-server: "esxi.example.com"
      nbdkit.csi.k8s.io/param-user: "root"
      nbdkit.csi.k8s.io/param-vm: "moref=2"
      nbdkit.csi.k8s.io/param-file: "[datastore1] VM/disk.vmdk"
      nbdkit.csi.k8s.io/param-thumbprint: "AA:BB:CC:DD:EE:FF:00:11:22:33:44:55:66:77:88:99:AA:BB:CC:DD"
      nbdkit.csi.k8s.io/param-libdir: "/opt/vmware-vix-disklib-distrib"
      nbdkit.csi.k8s.io/filters: "readahead"
    nodeStageSecretRef:
      name: vddk-credentials
      namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmware-disk-1
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  storageClassName: ""
  resources:
    requests:
      storage: 100Gi
  volumeName: vmware-disk-1
