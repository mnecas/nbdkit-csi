apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: nbdkit-csi
allowPrivilegedContainer: true
allowHostNetwork: true
allowHostDirVolumePlugin: true
allowHostPorts: true
allowHostPID: false
allowHostIPC: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - hostPath
  - secret
  - configMap
  - emptyDir
  - projected
users:
  - system:serviceaccount:nbdkit-csi:nbdkit-csi-node
