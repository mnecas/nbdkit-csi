apiVersion: v1
kind: ServiceAccount
metadata:
  name: nbdkit-csi-node
  namespace: nbdkit-csi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nbdkit-csi-node
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nbdkit-csi-node
subjects:
  - kind: ServiceAccount
    name: nbdkit-csi-node
    namespace: nbdkit-csi
roleRef:
  kind: ClusterRole
  name: nbdkit-csi-node
  apiGroup: rbac.authorization.k8s.io
